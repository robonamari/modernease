name: Auto Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Create clean release archive
        run: |
          set -e
          mkdir -p dist
          zip -rq "dist/ModernEase-${GITHUB_REF_NAME}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "dist/*" \
            -x "languages/**/*.po" \
            -x "languages/**/*.pot" \
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/ModernEase-${{ github.ref_name }}.zip
